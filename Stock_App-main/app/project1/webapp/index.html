<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>SAP Stock Trading Platform</title>

    <script
        id="sap-ui-bootstrap"

        src="https://ui5.sap.com/resources/sap-ui-core.js"

        data-sap-ui-theme="sap_horizon_dark"

        data-sap-ui-resourceroots='{
            "sap.stocktrading.app": "./"
        }'

        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"

        data-sap-ui-compatVersion="edge"

        data-sap-ui-async="true"

        data-sap-ui-frameOptions="trusted"

        data-sap-ui-preload="off"

        data-sap-ui-libs="
            sap.m,
            sap.ui.core,
            sap.f,
            sap.ui.layout,
            sap.tnt,
            sap.ui.table,
            sap.viz
        ">

    </script>

    <style>

        html,
        body,
        body > div,
        #container,
        #container-uiarea {

            height: 100%;
            margin: 0;

        }

    </style>

</head>

<body
    class="sapUiBody sapUiSizeCompact"
    id="content">

    <div
        data-sap-ui-component
        data-name="sap.stocktrading.app"
        data-id="container"
        data-settings='{"id":"stockTrading"}'
        data-handle-validation="true">

    </div>

</body>

</html>
