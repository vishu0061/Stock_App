_schema-version: "3.1"
ID: sap-stock-trading
version: 1.0.0
description: "SAP BTP Stock Trading Application"

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci --production --prefix srv

modules:

  - name: stock-trading-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: stock-trading-hana
      - name: stock-trading-xsuaa

  - name: stock-trading-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: stock-trading-hana

  - name: stock-trading-app
    type: html5
    path: app
    build-parameters:
      builder: custom
      commands: []
      supported-platforms: []
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: stock-trading-srv
          url: ~{srv-url}
          forwardAuthToken: true

resources:

  - name: stock-trading-hana
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  - name: stock-trading-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sap-stock-trading-${org}-${space}
        tenant-mode: dedicated